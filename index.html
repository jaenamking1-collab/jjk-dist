<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 분배금 공지</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/npm/pretendard/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#f4f7ff; --bg2:#ffffff; --bg3:#eef3ff; --bg4:#e3e9f6;
    --border:#e3ddf3; --text:#1a1330; --text2:#4b5563; --text3:#9ca3af;
    --accent:#5b5bf0; --accent2:#3b82f6; --green:#10b981; --red:#f43f5e; --purple:#a855f7;
    --mono:'Pretendard',sans-serif; --sans:'Pretendard',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:
      radial-gradient(1200px 600px at 8% -8%, #ffe4f2 0%, rgba(255,228,242,0) 55%),
      radial-gradient(1000px 520px at 100% 0%, #dcefff 0%, rgba(220,239,255,0) 50%),
      radial-gradient(900px 700px at 50% 120%, #e6fff6 0%, rgba(230,255,246,0) 55%),
      var(--bg);
    background-attachment:fixed;
    color:var(--text); font-family:var(--sans); min-height:100vh;
    font-feature-settings:"tnum"; font-variant-numeric:tabular-nums;
  }
  header{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 20px; background:linear-gradient(100deg,#fff0f7 0%,#eef1ff 38%,#e6f7ff 68%,#e9fff6 100%);
    border-bottom:1px solid var(--border);
  }
  .logo{font-size:18px; font-weight:800; letter-spacing:-0.3px;
    background:linear-gradient(90deg,#ec4899,#8b5cf6,#3b82f6);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .refresh{background:#fff; border:1px solid #e7e0f5; border-radius:10px; padding:7px 12px;
    font-size:13px; color:var(--text2); cursor:pointer;}
  .refresh:hover{background:var(--bg3);}
  .wrap{padding:16px;}
  .panels{display:flex; gap:14px; align-items:stretch; flex-wrap:wrap; justify-content:center;}
  .panel{border-radius:10px; padding:14px;}
  .p-notice{width:300px; flex-shrink:0; background:#f0fdf4; border:1px solid #dcfce7;}
  .p-cal{flex:0 1 792px; min-width:460px; max-width:792px; background:#f8fafc; border:1px solid #e2e8f0;}
  .p-sched{width:340px; flex-shrink:0; background:#fdf4ff; border:1px solid #f0e2f5;}
  .p-title{font-size:12px; font-weight:700; margin-bottom:8px;}

  /* ── notice cards ── */
  #noticeGrid{display:flex; flex-direction:column; gap:8px;}
  .notice-card{background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:10px 14px; position:relative; overflow:hidden;}
  .notice-card::before{content:''; position:absolute; top:0; left:0; right:0; height:3px;}
  .notice-card.kodex::before{background:#2563eb;} .notice-card.tiger::before{background:#f97316;}
  .notice-card.ace::before{background:#059669;}   .notice-card.plus::before{background:#7c3aed;}
  .notice-card.rise::before{background:#dc2626;}   .notice-card.sol::before{background:#0891b2;}
  .notice-brand{font-size:11px; font-weight:700; letter-spacing:.5px; margin-bottom:6px; display:flex; align-items:center; gap:6px;}
  .notice-brand.kodex{color:#2563eb;} .notice-brand.tiger{color:#f97316;} .notice-brand.ace{color:#059669;}
  .notice-brand.plus{color:#7c3aed;}  .notice-brand.rise{color:#dc2626;}  .notice-brand.sol{color:#0891b2;}
  .notice-item{padding:4px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .notice-item:last-child{border-bottom:none; padding-bottom:0;}
  .notice-title{font-size:12px; color:var(--text); line-height:1.4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; cursor:pointer;}
  .notice-title:hover{color:var(--accent2); text-decoration:underline;}
  .notice-date{font-size:11px; color:var(--text3); white-space:nowrap; font-family:var(--mono);}
  .new-badge{display:inline-block; margin-left:4px; padding:0 5px; height:14px; line-height:14px; border-radius:7px; background:#ef4444; color:#fff; font-size:9px; font-weight:800; vertical-align:1px;}
  /* 공지 카드 하단: 공지에 나온 전체 종목 목록 (펼치기/접기) */
  /* ── 하단 공지 종목 전체 그리드 (포트폴리오 앱의 분배 내역 섹션과 동일 레이아웃) ── */
  .dist-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .dist-items{max-height:340px; overflow-y:auto;}
  .notice-loading{font-size:12px; color:var(--text3); text-align:center; padding:16px 0;}
  .notice-err{font-size:12px; color:var(--red); text-align:center; padding:16px 0;}
  .spinner{display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── 운용사별 일정: 포트폴리오 앱과 동일한 격자 표 ── */
  #distScheduleList table{width:100%; border-collapse:collapse; font-size:11px; border:2px solid #111827; background:var(--bg2);}
  #distScheduleList th{padding:6px 3px; font-size:11px; font-weight:700; color:#111827; background:#e2e8f0; border:1px solid #111827; white-space:nowrap;}
  #distScheduleList td{border:1px solid #64748b; vertical-align:middle;}

  /* ── 달력 셀 ── */
  .cal-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:4px; width:100%;}
  .cal-dow{text-align:center; font-size:13px; font-weight:800; padding:6px 0; color:#fff; background:#4f46e5; border-radius:5px;}
  .cal-cell{padding:5px; border-radius:6px; min-height:95px; display:flex; flex-direction:column;}
  .cal-date{font-size:13px; margin-bottom:2px;}
  .cal-icons{display:grid; grid-template-columns:repeat(3,1fr); gap:2px;}
  .cal-chip{display:flex; align-items:center; justify-content:center; color:#fff; font-size:9px; font-weight:700; height:15px; border-radius:2px; white-space:nowrap; padding:0 2px;}
  .cal-chip .chip-min{display:none;}
  .cal-evt{margin-top:3px; font-size:11px; font-weight:700; text-align:center; padding:2px 0; border-radius:4px;}
  .cal-evt .lbl-short{display:none;}
  .cal-companies{display:none; flex-wrap:wrap; gap:3px 10px; justify-content:center; margin-bottom:6px; font-size:10px; color:var(--text2);}
  .cal-co{display:flex; align-items:center; gap:3px;}
  .co-chip{display:inline-flex; align-items:center; justify-content:center; padding:0 3px; height:13px; border-radius:2px; color:#fff; font-size:8px; font-weight:700;}

  /* ── mobile: 세로 스택, 달력은 화면 폭에 맞게 축소, 일정 표만 좌우 스크롤 ── */
  @media (max-width:820px){
    .panels{flex-direction:column; align-items:stretch; gap:8px;}
    .dist-grid{grid-template-columns:1fr;}
    .panel{padding:10px;}
    .p-notice, .p-cal, .p-sched{width:100%; max-width:100%; min-width:0;}
    .cal-companies{display:flex;}
    .cal-scroll, .sched-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}
    #distScheduleList{min-width:420px;}
    .cal-grid{gap:2px;}
    .cal-dow{font-size:11px; padding:4px 0;}
    .cal-cell{padding:3px; min-height:74px; border-radius:5px;}
    .cal-date{font-size:11px;}
    .cal-icons{gap:1px;}
    .cal-chip{font-size:7px; height:13px; padding:0 1px;}
    .cal-chip .chip-full{display:none;}
    .cal-chip .chip-min{display:inline;}
    .cal-evt{font-size:9px; padding:1px 0;}
    .cal-evt .lbl-full{display:none;}
    .cal-evt .lbl-short{display:inline;}
  }
</style>
</head>
<body>
<header>
  <div class="logo">ETF 분배금 공지</div>
  <button class="refresh" onclick="pageRefresh()">🔄 새로고침</button>
</header>

<div class="wrap">
  <div class="panels">
    <div class="panel p-notice">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <div class="p-title" id="noticeTitle" style="color:#16a34a;margin-bottom:0">📢 분배금 공지</div>
        <button onclick="noticeShiftMonth(-1)" title="이전 달" style="width:24px;height:24px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;line-height:1">←</button>
        <button onclick="noticeShiftMonth(1)" title="다음 달" style="width:24px;height:24px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;line-height:1">→</button>
      </div>
      <div id="noticeGrid"><div class="notice-loading">불러오는 중...</div></div>
    </div>
    <div class="panel p-cal">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <div class="p-title" style="color:#64748b;margin-bottom:0">📅 분배 일정 달력</div>
        <button onclick="calShiftWeek(-1)" title="한 주 앞으로" style="width:24px;height:24px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;line-height:1">←</button>
        <button onclick="calShiftWeek(1)" title="한 주 뒤로" style="width:24px;height:24px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;line-height:1">→</button>
        <button onclick="calShiftWeek(0)" title="오늘 주로" style="height:24px;padding:0 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;line-height:1">오늘</button>
      </div>
      <div class="cal-scroll">
        <div id="distMasterCalendar"><div style="color:var(--text3);font-size:13px"><span class="spinner"></span>불러오는 중...</div></div>
      </div>
    </div>
    <div class="panel p-sched">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <div class="p-title" id="schedTitle" style="color:#a855a8;margin-bottom:0">🏢 운용사별 일정</div>
        <button onclick="schedShiftMonth(-1)" title="이전 달" style="width:24px;height:24px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;line-height:1">←</button>
        <button onclick="schedShiftMonth(1)" title="다음 달" style="width:24px;height:24px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;line-height:1">→</button>
      </div>
      <div class="sched-scroll"><div id="distScheduleList"></div></div>
    </div>
  </div>
  <div style="background:#fffbeb;border:1px solid #fef3c7;border-radius:12px;padding:16px;margin-top:14px">
    <div style="font-size:15px;font-weight:700;margin-bottom:12px">📋 공지 종목 전체</div>
    <div id="distGrid"><div style="color:var(--text3);font-size:13px"><span class="spinner"></span>불러오는 중...</div></div>
  </div>
</div>

<script>
// ⚠️ 공개 프록시 GAS의 exec URL 을 여기에 넣는다 (public_dist_proxy.gs 배포 후 발급된 URL).
//    개인 GAS URL 이 아니라 '공개 프록시' URL 이어야 함 — 개인 데이터가 노출되지 않음.
const API = 'https://script.google.com/macros/s/AKfycbwdk4_x3iwTQRjmGhNS2q0WLnVE9ihsPc_NOd3co6Juidedaf89ULVzCK8CYAYZXf8/exec';

async function api(params){
  const url = API + '?' + new URLSearchParams(params);
  const res = await fetch(url, { redirect:'follow' });
  return res.json();
}

const DIST_SOURCES = [
  { id:'kodex', name:'KODEX', label:'삼성자산운용',   color:'#2563eb' },
  { id:'tiger', name:'TIGER', label:'미래에셋자산운용', color:'#f59e0b' },
  { id:'ace',   name:'ACE',   label:'한국투자신탁운용', color:'#059669' },
  { id:'plus',  name:'PLUS',  label:'한화자산운용',   color:'#7c3aed' },
  { id:'rise',  name:'RISE',  label:'KB자산운용',    color:'#dc2626' },
  { id:'sol',   name:'SOL',   label:'신한자산운용',   color:'#0891b2' }
];
const SCHED_CFG = [
  { key:'공시일',  color:'#f59e0b', label:'분배금공시일', short:'공시일' },
  { key:'분배락일', color:'#22c55e', label:'분배락일', short:'분배락일' },
  { key:'기준일',  color:'#3b82f6', label:'분배금지급기준일', short:'기준일' },
  { key:'지급일',  color:'#ef4444', label:'분배금지급일', short:'지급일' },
];
// 공개 페이지: 6개 운용사 공지를 모두 프록시(getEtfNotices)로 통일 (브라우저 CORS 없음).
const NOTICE_SOURCES = DIST_SOURCES.map(s => ({
  id: s.id, name: s.name, label: s.label,
  fetch: async () => { const d = await api({ action:'getEtfNotices', source:s.id }); return d.items || []; }
}));

let _distData = [];
let _calWeekOffset = 0;   // 달력 주 단위 이동 (←/→ 버튼)
let _schedMonthOffset = 0; // 운용사별 일정 표: 월 단위 이동 (0=이번 달)

// dir: -1 한 주 앞으로, +1 한 주 뒤로, 0 오늘 주로 리셋
function calShiftWeek(dir){
  if (!_distData.length) return;
  _calWeekOffset = dir === 0 ? 0 : Math.max(-26, Math.min(26, _calWeekOffset + dir));
  renderMasterCalendar(_distData);
}

// 운용사별 일정 표의 달 이동. 공지 데이터가 전월~익월 정도만 있어 ±1로 제한.
function schedShiftMonth(dir){
  if (!_distData.length) return;
  _schedMonthOffset = Math.max(-1, Math.min(1, _schedMonthOffset + dir));
  renderMasterCalendar(_distData);
}

async function loadDistributions(force){
  const cal = document.getElementById('distMasterCalendar');
  if (cal) cal.innerHTML = '<div style="color:var(--text3);font-size:13px"><span class="spinner"></span> 불러오는 중...</div>';

  const timeout = ms => new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), ms));
  // force 재파싱은 OCR(특히 KODEX) 때문에 25초를 넘길 수 있어 여유를 크게 준다
  const fetchOne = s => Promise.race([
    api({ action:'getDistribution', source:s.id, force: force?'1':'' }).then(d => ({ ...s, data:d })),
    timeout(force ? 90000 : 25000).then(() => ({ ...s, data:{ items:[], error:'응답 시간 초과' } }))
  ]).catch(e => ({ ...s, data:{ items:[], error:String(e) } }));

  const results = await Promise.allSettled(DIST_SOURCES.map(fetchOne));
  _distData = results.map(r => r.value || {});
  renderMasterCalendar(_distData);
  renderDistGrid(_distData);
  loadAllNotices();
}

function renderMasterCalendar(allData){
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth() + 1;

  const parseDay = (str) => {
    if (!str) return null;
    const full = str.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
    if (full) return { m: parseInt(full[2]), d: parseInt(full[3]) };
    const ko = str.match(/(\d{1,2})월\s*(\d{1,2})일/);
    if (ko) return { m: parseInt(ko[1]), d: parseInt(ko[2]) };
    const sl = str.match(/(\d{1,2})[\/\.](\d{1,2})/);
    if (sl) return { m: parseInt(sl[1]), d: parseInt(sl[2]) };
    return null;
  };

  // 공개 페이지: 보유종목 개념 없음 → 항상 '전체 대표' 회차로 마킹
  const cycleOf = (sch, it) => {
    if (it && it.cycle) return it.cycle;
    const base = parseDay(sch['기준일'] || sch['지급일']);
    if (!base) return '';
    // 기준일의 '일'로 회차 추정(20일 이하=월중). 월 비교(base.m===month)는 월 경계에서 깨짐.
    return base.d <= 20 ? '월중' : '월말';
  };
  const addAll = (c, sch, it) => {
    const cyc = cycleOf(sch, it);
    SCHED_CFG.forEach(({ key, color, label, short }) => {
      const lbl = (key === '지급일' && cyc) ? `${cyc} 지급일` : label;
      const sh = (key === '지급일' && cyc) ? `${cyc} 지급일` : short;
      addMark(parseDay(sch[key]), c.name, c.color, lbl, color, sh);
    });
  };

  const prevBizDay = (m, d) => {
    const dt = new Date(year, m - 1, d);
    do { dt.setDate(dt.getDate() - 1); } while (dt.getDay() === 0 || dt.getDay() === 6);
    return { m: dt.getMonth() + 1, d: dt.getDate() };
  };
  const fillRakil = (sched, repSched) => {
    if (!sched) return sched;
    if (!sched['공시일'] && repSched && repSched['공시일']) sched['공시일'] = repSched['공시일'];
    if (!sched['분배락일'] && sched['기준일']) {
      const base = parseDay(sched['기준일']);
      if (base) { const p = prevBizDay(base.m, base.d); sched['분배락일'] = p.m + '월 ' + p.d + '일'; }
    }
    return sched;
  };

  const nextMonth = month === 12 ? 1 : month + 1;
  const prevMonth = month === 1 ? 12 : month - 1;
  const marks = {};
  const addMark = (p, source, sourceColor, label, labelColor, shortLabel, uncertain) => {
    if (!p) return;
    if (p.m !== month && p.m !== nextMonth && p.m !== prevMonth) return;
    const k = `${p.m}-${p.d}`;
    if (!marks[k]) marks[k] = [];
    if (marks[k].some(x => x.source === source && x.label === label)) return;
    marks[k].push({ source, sourceColor, label, labelColor, shortLabel: shortLabel || label, uncertain: !!uncertain });
  };
  allData.forEach(c => {
    if (c.id === 'sol') return; // SOL은 확정 공지가 없어 아래에서 공통 지급일에 '?'로 별도 표기
    const repSched = (c.data && c.data.schedule) || {};
    const items = (c.data && c.data.items) || [];
    const inRange = sch => {
      const b = parseDay(sch['기준일']), p = parseDay(sch['지급일']);
      const ok = x => x && (x.m === month || x.m === nextMonth || x.m === prevMonth);
      if (ok(b)) return true;
      if (p && (p.m === month || p.m === nextMonth)) return true;
      return false;
    };
    const markedCyc = new Set();
    // 회차(월중/월말)별 대표 1개씩 마킹
    ['월중','월말'].forEach(cyc => {
      if (markedCyc.has(cyc)) return;
      const rep = items.find(it => {
        const sch = fillRakil(it.sched && Object.keys(it.sched).length ? {...it.sched} : {...repSched}, repSched);
        return cycleOf(sch, it) === cyc && inRange(sch);
      });
      if (rep) {
        const sch = fillRakil(rep.sched && Object.keys(rep.sched).length ? {...rep.sched} : {...repSched}, repSched);
        addAll(c, sch, rep);
        markedCyc.add(cyc);
      }
    });
    if (!markedCyc.size) {
      const sch = fillRakil({...repSched}, repSched);
      if (inRange(sch)) addAll(c, sch);
    }
  });

  // SOL: 확정 공지가 없어 실제 회차 날짜 대신, 다른 운용사들의 공통 지급일에 '?'로 얹는다.
  const sol = allData.find(c => c.id === 'sol');
  if (sol) {
    const solCycles = new Set(((sol.data && sol.data.items) || []).map(it => it.cycle).filter(Boolean));
    ['월중','월말'].forEach(cyc => {
      if (!solCycles.has(cyc)) return;
      const lbl = `${cyc} 지급일`;
      // 해당 회차 지급일이 가장 많이 몰린 날짜 = 공통 지급일
      let bestKey = null, bestN = 0;
      Object.keys(marks).forEach(k => {
        const n = marks[k].filter(mk => mk.label === lbl).length;
        if (n > bestN) { bestN = n; bestKey = k; }
      });
      if (bestKey) {
        const [pm, pd] = bestKey.split('-').map(Number);
        addMark({ m: pm, d: pd }, sol.name, sol.color, lbl, '#ef4444', lbl, true);
      }
    });
  }

  const today = now.getDate();
  const dowsShow = ['월','화','수','목','금']; // 평일만

  // 오늘이 속한 주가 5주 창의 가운데(3번째 줄)에 오도록 2주 전 일요일부터 시작.
  // ←/→ 버튼은 여기에 주 단위로만 더해져 항상 한 주씩 움직인다.
  const todayDate = new Date(year, month - 1, now.getDate());
  const rangeStart = new Date(todayDate);
  rangeStart.setDate(rangeStart.getDate() - rangeStart.getDay() - 14);
  rangeStart.setDate(rangeStart.getDate() + _calWeekOffset * 7);
  const rangeEnd = new Date(rangeStart);
  rangeEnd.setDate(rangeEnd.getDate() + 34);

  const cells = [];
  const cur = new Date(rangeStart);
  while (cur <= rangeEnd) {
    const dw = cur.getDay();
    if (dw !== 0 && dw !== 6) cells.push({ m: cur.getMonth() + 1, d: cur.getDate(), next: false });
    cur.setDate(cur.getDate() + 1);
  }

  const cellHtml = (cell) => {
    if (!cell) return '<div class="cal-cell"></div>';
    const { m, d, next } = cell;
    const dow = new Date(year, m - 1, d).getDay();
    const ms = marks[`${m}-${d}`] || [];
    const isToday = m === month && d === today;
    const weekendBg = dow === 0 ? 'background:#fef6f6;' : dow === 6 ? 'background:#f5f8ff;' : '';
    const bg = isToday ? 'background:#eff6ff;' : ms.length ? 'background:var(--bg3);' : weekendBg;
    const border = isToday ? 'border:2px solid #3b82f6;' : 'border:1px solid var(--border);';
    const dateColor = isToday ? '#2563eb' : dow === 0 ? '#dc2626' : dow === 6 ? '#2563eb' : 'var(--text)';
    const byLabel = {};
    ms.forEach(mk => {
      if (!byLabel[mk.label]) byLabel[mk.label] = { labelColor: mk.labelColor, shortLabel: mk.shortLabel, sources: [] };
      byLabel[mk.label].sources.push({ name: mk.source, color: mk.sourceColor, uncertain: mk.uncertain });
    });
    const eventHtml = Object.keys(byLabel).map(label => {
      const g = byLabel[label];
      // 고정 슬롯: 윗줄 KODEX·TIGER·ACE / 아랫줄 PLUS·RISE·SOL, 없는 회사는 빈칸
      const bySource = {};
      g.sources.forEach(s => { bySource[s.name] = { color: s.color, uncertain: s.uncertain }; });
      const icons = DIST_SOURCES.map(s => { const b = bySource[s.name]; const q = b && b.uncertain ? '?' : '';
        return b
        ? `<span class="cal-chip" style="background:${b.color}"><span class="chip-full">${s.name}${q}</span><span class="chip-min">${s.name.slice(0,3)}${q}</span></span>`
        : '<span class="cal-chip"></span>';
      }).join('');
      return `<div style="margin-top:4px">
        <div class="cal-icons">${icons}</div>
        <div class="cal-evt" style="background:${g.labelColor}1a;color:${g.labelColor}"><span class="lbl-full">${label}</span><span class="lbl-short">${g.shortLabel || label}</span></div>
      </div>`;
    }).join('');
    return `<div class="cal-cell" style="${bg}${border}">
      <div class="cal-date" style="font-weight:${ms.length||isToday?'700':'400'};color:${dateColor}">${m}/${d}</div>
      <div style="margin-top:auto">${eventHtml}</div>
    </div>`;
  };

  const calHtml = `
    <div>
      <div class="cal-companies">
        ${DIST_SOURCES.map(s => `<span class="cal-co"><span class="co-chip" style="background:${s.color}">${s.name.slice(0,3)}</span>${s.name}</span>`).join('')}
      </div>
      <div class="cal-grid">
        ${dowsShow.map(d => `<div class="cal-dow">${d}</div>`).join('')}
        ${cells.map(cellHtml).join('')}
      </div>
    </div>`;
  document.getElementById('distMasterCalendar').innerHTML = calHtml;

  // ── 운용사별 일정 표 (월중/월말 2줄) ──
  // ←/→ 버튼으로 고른 달(selM)의 일정만 표시. 행 귀속 월은 기준일(없으면 지급일)의 월.
  const selM = ((month - 1 + _schedMonthOffset) % 12 + 12) % 12 + 1;
  const schedTitle = document.getElementById('schedTitle');
  if (schedTitle) schedTitle.textContent = `🏢 ${selM}월 운용사별 일정`;
  const rowsData = [];
  allData.forEach(c => {
    const repSched = (c.data && c.data.schedule) || {};
    const items = (c.data && c.data.items) || [];
    const pickCycle = (cyc) => {
      for (const it of items) {
        const sch = fillRakil((it.sched && Object.keys(it.sched).length) ? {...it.sched} : {...repSched}, repSched);
        if (cycleOf(sch, it) !== cyc) continue;
        const p = parseDay(sch['기준일'] || sch['지급일']);
        if (!p || p.m !== selM) continue;
        return { sched: sch, hasNotice: true };
      }
      return { sched: null, hasNotice: false };
    };
    const mid = pickCycle('월중'), end = pickCycle('월말');
    if (!mid.hasNotice && !end.hasNotice) return;
    rowsData.push({ name: c.name, color: c.color, mid, end, isSol: c.id === 'sol' });
  });

  const dcell = (info, key) => {
    if (!info || !info.hasNotice) return '';
    const v = info.sched && info.sched[key];
    if (!v) return '';
    const p = parseDay(v);
    return p ? `${p.m}/${p.d}` : v;
  };
  // 회차(월중/월말)마다 실제 행을 나눠 그린다. 운용사명은 rowspan.
  // 월중/월말은 행 전체 배경색으로 구분, 회차엔 해당 월을 붙여 표시(예: 7월 월중).
  // 공지 없는 회차도 줄은 유지(날짜만 비움).
  const CYC = { '월중': ['#ecfeff', '#0e7490'], '월말': ['#f5f3ff', '#6d28d9'] };
  const dateCell = (info, key, col, bg, isSol) => {
    // SOL은 확정 공지가 없어 날짜를 표기하지 않고 '-'로 둔다.
    const v = isSol ? '' : dcell(info, key);
    const txt = isSol ? '-' : (v || '·');
    return `<td style="text-align:center;padding:5px 3px;font-family:var(--mono);white-space:nowrap;font-weight:600;background:${bg};color:${v ? col : '#cbd5e1'}">${txt}</td>`;
  };
  const tableHtml = rowsData.length ? `
    <table>
      <thead><tr>
        <th style="text-align:left;padding:6px 8px">운용사</th>
        <th style="text-align:left;padding:6px 6px">회차</th>
        <th style="text-align:center;color:#d97706">공시</th>
        <th style="text-align:center;color:#16a34a">분배락</th>
        <th style="text-align:center;color:#2563eb">기준</th>
        <th style="text-align:center;color:#dc2626">지급</th>
      </tr></thead>
      <tbody>${rowsData.map(r => {
        const cycles = [['월중', r.mid], ['월말', r.end]];
        return cycles.map(([label, m], i) => {
          const [bg, col] = CYC[label];
          const monLabel = selM + '월 ' + label; // 제목의 달과 항상 일치
          const nameCell = i === 0
            ? `<td rowspan="${cycles.length}" style="padding:5px 8px;white-space:nowrap;vertical-align:middle"><span style="font-weight:700;color:${r.color}">${r.name}</span></td>`
            : '';
          return `<tr>
            ${nameCell}
            <td style="padding:5px 6px;white-space:nowrap;background:${bg};color:${col};font-weight:700">${monLabel}</td>
            ${dateCell(m, '공시일', '#d97706', bg, r.isSol)}
            ${dateCell(m, '분배락일', '#16a34a', bg, r.isSol)}
            ${dateCell(m, '기준일', '#2563eb', bg, r.isSol)}
            ${dateCell(m, '지급일', '#dc2626', bg, r.isSol)}
          </tr>`;
        }).join('');
      }).join('')}</tbody>
    </table>` : `<div style="font-size:12px;color:var(--text3)">${selM}월 일정 정보가 없습니다</div>`;
  document.getElementById('distScheduleList').innerHTML = tableHtml;
}

// ── 공지 제목 → 통일 형식 ──
function normalizeNoticeTitle(title, source){
  if (!title) return { label: '공지', cycle: '기타', mon: 0 };
  const monM = title.match(/(\d{1,2})\s*월/);
  const mon = monM ? parseInt(monM[1]) : 0;
  if (source === 'ace') {
    if (/국고채|국채\s*3년/.test(title)) return { label: '비정기', cycle: '제외', mon };
    if (/데일리타겟|미국배당다우존스|시리즈/.test(title))
      return { label: (mon?mon+'월 ':'') + '월중배당', cycle: '월중', mon };
    return { label: (mon?mon+'월 ':'') + '월말배당', cycle: '월말', mon };
  }
  let cycle, label;
  if (/월말|말\s*분배|②|안내\s*②/.test(title)) { cycle = '월말'; label = (mon?mon+'월 ':'') + '월말배당'; }
  else if (/월중|중순|중간|①|안내\s*①/.test(title)) { cycle = '월중'; label = (mon?mon+'월 ':'') + '월중배당'; }
  else if (/특별|임시|추가|결산/.test(title)) { cycle = '특별'; label = (mon?mon+'월 ':'') + '특별배당'; }
  else { cycle = '기타'; label = (mon?mon+'월 ':'') + '분배금 공지'; }
  return { label, cycle, mon };
}

let _noticeData = null;    // 공지 원본 (월 이동 시 재사용)
let _noticeMonthOffset = 0; // 분배금 공지 패널: 월 단위 이동 (0=이번 달)

function noticeShiftMonth(dir){
  if (!_noticeData) return;
  _noticeMonthOffset = Math.max(-1, Math.min(1, _noticeMonthOffset + dir));
  renderNotices();
}

async function loadAllNotices(){
  const grid = document.getElementById('noticeGrid');
  if (!grid) return;
  grid.innerHTML = '<div class="notice-loading">불러오는 중...</div>';
  const results = await Promise.allSettled(NOTICE_SOURCES.map(s =>
    s.fetch().then(items => ({ ...s, items })).catch(() => ({ ...s, items: [] }))
  ));
  _noticeData = results.map(r => r.value || {});
  renderNotices();
}

function renderNotices(){
  const grid = document.getElementById('noticeGrid');
  if (!grid || !_noticeData) return;
  const now = new Date();
  const selM = ((now.getMonth() + _noticeMonthOffset) % 12 + 12) % 12 + 1;
  const title = document.getElementById('noticeTitle');
  if (title) title.textContent = `📢 ${selM}월 분배금 공지`;
  // 공지의 귀속 월: 제목의 'N월'(norm.mon) 우선, 없으면 등록일의 월
  const monOf = n => {
    if (n.norm.mon) return n.norm.mon;
    const m = String(n.date || '').match(/\d{4}[.\-\/](\d{1,2})/);
    return m ? parseInt(m[1]) : 0;
  };
  grid.innerHTML = _noticeData.map(({ id, name, label, items }) => {
    const all = (items || []).map(n => ({ ...n, norm: normalizeNoticeTitle(n.title, id) }))
      .filter(n => n.norm.cycle !== '제외');
    const inMonth = all.filter(n => monOf(n) === selM);
    const pickByCycle = cyc => {
      const cand = inMonth.filter(n => n.norm.cycle === cyc);
      if (!cand.length) return null;
      cand.sort((a,b) => String(b.date||'').localeCompare(String(a.date||'')));
      return cand[0];
    };
    // 월중/월말 슬롯은 공지가 없어도 자리를 비워둔다(카드 높이·순서 고정). 특별·기타는 있을 때만.
    const picks = [pickByCycle('월중'), pickByCycle('월말'), pickByCycle('특별')];
    const extra = picks.every(p => !p) ? inMonth.slice(0, 1) : []; // 회차 분류 안 된 공지 폴백
    // 등록 7일 이내 공지엔 NEW 배지 — 월중 공시(10~13일)→기준일(15일) 흐름을 다 덮게
    const isNew = n => {
      const m = String(n.date || '').match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
      if (!m) return false;
      return (Date.now() - new Date(+m[1], +m[2] - 1, +m[3]).getTime()) < 7 * 86400000;
    };
    const itemHtml = n => `
          <div class="notice-item">
            <span class="notice-title" onclick="window.open('${n.url}','_blank')" title="${(n.title||'').replace(/"/g,'&quot;')}">${n.norm.label}${isNew(n) ? '<span class="new-badge">NEW</span>' : ''}</span>
            <span class="notice-date">${n.date}</span>
          </div>`;
    const emptySlot = cyc => `
          <div class="notice-item">
            <span style="font-size:12px;color:var(--text3);line-height:1.4">${selM}월 ${cyc}배당</span>
            <span class="notice-date">-</span>
          </div>`;
    const rows = (items && items.length)
      ? [ picks[0] ? itemHtml(picks[0]) : emptySlot('월중'),
          picks[1] ? itemHtml(picks[1]) : emptySlot('월말'),
          picks[2] ? itemHtml(picks[2]) : '',
          ...extra.map(itemHtml) ].join('')
      : '<div class="notice-err">불러오기 실패</div>';
    return `
      <div class="notice-card ${id}">
        <div class="notice-brand ${id}">● ${name} <span style="font-weight:400;color:var(--text3)">${label}</span></div>
        ${rows}
      </div>`;
  }).join('');
}

// ── 공지 종목 전체 (하단 섹션) ──
// 포트폴리오 앱의 '내 보유 종목 분배 내역'과 같은 레이아웃(운용사별 카드 3×2, 표)로
// 현재 공지의 전체 종목을 표시. 이력(hist)·기준일이 전월~익월 밖인 종목은 제외.
function renderDistGrid(allData){
  const grid = document.getElementById('distGrid');
  if (!grid) return;
  const curMonth = new Date().getMonth() + 1;
  const cycleOf = (it, repSched) => {
    if (it && it.cycle) return it.cycle;
    const sch = (it.sched && Object.keys(it.sched).length) ? it.sched : (repSched || {});
    const ref = sch['기준일'] || sch['지급일'] || '';
    const m = ref.match(/(\d{1,2})월\s*(\d{1,2})일/) || ref.match(/\d{1,2}[\/\.](\d{1,2})/);
    if (!m) return '';
    const day = m[2] != null ? parseInt(m[2]) : parseInt(m[1]);
    return day <= 20 ? '월중' : '월말';
  };
  const esc = s => String(s || '').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  const cards = allData.map(c => {
    const d = c.data || {};
    const items = (d.items || []).filter(it => {
      if (it.hist) return false;
      const sch = (it.sched && Object.keys(it.sched).length) ? it.sched : (d.schedule || {});
      const mm = (sch['기준일'] || '').match(/(\d{1,2})월/);
      if (mm) {
        const rm = parseInt(mm[1]);
        const nextM = curMonth === 12 ? 1 : curMonth + 1;
        const prevM = curMonth === 1 ? 12 : curMonth - 1;
        if (rm !== curMonth && rm !== nextM && rm !== prevM) return false;
      }
      return true;
    });
    let body;
    if (items.length) {
      body = `<div class="dist-items"><table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:var(--bg3)">
          <th style="padding:5px 6px;text-align:center;font-size:10px;color:var(--text3);border:1px solid var(--border)">주기</th>
          <th style="padding:5px 8px;text-align:left;font-size:10px;color:var(--text3);border:1px solid var(--border)">코드</th>
          <th style="padding:5px 8px;text-align:left;font-size:10px;color:var(--text3);border:1px solid var(--border)">종목명</th>
          <th style="padding:5px 8px;text-align:right;font-size:10px;color:var(--text3);border:1px solid var(--border)">분배금</th>
          <th style="padding:5px 8px;text-align:right;font-size:10px;color:var(--text3);border:1px solid var(--border)">분배율</th>
        </tr></thead>
        <tbody>${items.map(it => {
          const cyc = cycleOf(it, d.schedule);
          const cycColor = cyc === '월중' ? '#2563eb' : cyc === '월말' ? '#db2777' : 'var(--text3)';
          const rowBg = cyc === '월중' ? 'background:#2563eb0a;' : cyc === '월말' ? 'background:#db27770a;' : '';
          return `<tr style="${rowBg}">
          <td style="padding:5px 6px;text-align:center;border:1px solid var(--border)">${cyc ? `<span style="display:inline-block;background:${cycColor}1a;color:${cycColor};font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px">${cyc}</span>` : '-'}</td>
          <td style="padding:5px 8px;font-size:11px;font-family:var(--mono);border:1px solid var(--border)">${it.ticker || ''}</td>
          <td style="padding:5px 8px;font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:1px solid var(--border)" title="${esc(it.name)}">${esc(it.name)}</td>
          <td style="padding:5px 8px;font-size:12px;font-weight:600;text-align:right;font-family:var(--mono);border:1px solid var(--border)">${it.amount != null ? Number(it.amount).toLocaleString() : '-'}</td>
          <td style="padding:5px 8px;font-size:11px;font-weight:600;text-align:right;color:${c.color};border:1px solid var(--border)">${it.rate != null && it.rate > 0 ? Number(it.rate).toFixed(2) + '%' : '-'}</td>
        </tr>`}).join('')}</tbody>
      </table></div>`;
    } else if (d.error) {
      body = `<div style="padding:10px 12px;font-size:12px;color:var(--text3)">⚠️ ${d.error}</div>`;
    } else {
      body = `<div style="padding:10px 12px;font-size:12px;color:var(--text3)">공지 종목 없음</div>`;
    }
    return `<div style="background:${c.color}0a;border:1px solid ${c.color}33;border-radius:10px;overflow:hidden">
      <div style="padding:8px 12px;border-bottom:1px solid ${c.color}33;display:flex;align-items:center;gap:6px;background:${c.color}1f">
        <span style="font-weight:700;font-size:13px;color:${c.color}">${c.name}</span>
        <span style="font-size:11px;color:var(--text3)">${c.label}</span>
        <span style="font-size:11px;color:var(--text3);margin-left:auto">${items.length}종목</span>
      </div>${body}
    </div>`;
  });
  grid.innerHTML = `<div class="dist-grid">${cards.join('')}</div>`;
}

// 새로고침 버튼: 페이지 자체를 다시 로드(배포된 새 코드 반영) + 데이터 강제 갱신
function pageRefresh(){
  sessionStorage.setItem('forceRefresh', '1');
  location.reload();
}
const _force = sessionStorage.getItem('forceRefresh') === '1';
sessionStorage.removeItem('forceRefresh');
loadDistributions(_force);
</script>
